name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    strategy:
      matrix:
        flavor: [phone, tv]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build web assets
        run: npm run build:production

      - name: Sync Capacitor
        run: npx cap copy && npx cap sync android

      - name: Build Android APK + AAB (${{ matrix.flavor }})
        run: |
          cd android
          ./gradlew assemble${{ matrix.flavor == 'phone' && 'Phone' || 'Tv' }}Release
          ./gradlew bundle${{ matrix.flavor == 'phone' && 'Phone' || 'Tv' }}Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zaflix-${{ matrix.flavor }}
          path: |
            android/app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk
            android/app/build/outputs/bundle/${{ matrix.flavor }}Release/*.aab
          if-no-files-found: error

  create-release:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          find zaflix-phone -type f -exec cp {} release-assets/ \;
          find zaflix-tv -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Zaflix ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
