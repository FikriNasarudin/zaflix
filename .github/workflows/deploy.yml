name: Build & Deploy

on:
  push:
    branches:
      - staging
      - feature/android-tv
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    if: github.ref == 'refs/heads/staging'
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install & Build
        run: |
          npm ci --include=dev
          npm run build:production

      - name: Deploy to Release Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: release

  build-android:
    if: github.ref == 'refs/heads/feature/android-tv' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        flavor: [phone, tv]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build web assets
        run: npm run build:production

      - name: Sync Capacitor
        run: npx cap copy && npx cap sync android

      - name: Build Android APK (${{ matrix.flavor }})
        run: |
          cd android
          ./gradlew assemble${{ matrix.flavor == 'phone' && 'Phone' || 'Tv' }}Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zaflix-${{ matrix.flavor }}
          path: android/app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk
          if-no-files-found: error

      - name: Upload AAB (if available)
        uses: actions/upload-artifact@v4
        with:
          name: zaflix-${{ matrix.flavor }}-aab
          path: android/app/build/outputs/bundle/${{ matrix.flavor }}Release/*.aab
          if-no-files-found: ignore
